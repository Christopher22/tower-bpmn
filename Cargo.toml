[package]
name = "axum-bpmn"
version = "0.1.0"
edition = "2024"

[dependencies]
chrono = { version = "0.4.43", features = ["serde"] }
dashmap = "6.1.0"
futures = { version = "0.3", features = ["alloc", "executor"] }
parking_lot = "0.12.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.49.0", features = ["rt", "macros", "time", "sync", "rt-multi-thread"] }
uuid = { version = "1.21.0", features = ["v4", "serde"] }
